<svg xmlns="http://www.w3.org/2000/svg" width="86" height="20" role="img" aria-label="license: MIT">
  <title>license: MIT</title>
  <linearGradient id="s" x2="0" y2="100%">
    <stop offset="0" stop-color="#fff" stop-opacity=".18"/>
    <stop offset="1" stop-color="#000" stop-opacity=".10"/>
  </linearGradient>
  <clipPath id="r">
    <rect width="86" height="20" rx="3"/>
  </clipPath>
  <g clip-path="url(#r)">
    <rect width="52" height="20" fill="#555"/>
    <rect x="52" width="34" height="20" fill="#d4aa00"/>
    <rect width="86" height="20" fill="url(#s)"/>
  </g>
  <g fill="#fff" text-anchor="middle"
     font-family="Verdana,DejaVu Sans,sans-serif" font-size="11">
    <text x="26.0" y="15" fill="#010101" fill-opacity=".3">license</text>
    <text x="26.0" y="14">license</text>
    <text x="69.0" y="15" fill="#010101" fill-opacity=".3">MIT</text>
