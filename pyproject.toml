[tool.ruff]
target-version = "py313"
line-length = 88

[tool.ruff.lint]
select = ["ASYNC", "B", "BLE", "C90", "E", "F", "I", "RUF", "UP"]

[tool.ruff.lint.mccabe]
max-complexity = 15

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_default_fixture_loop_scope = "function"

[tool.coverage.run]
branch = true
source = ["custom_components/backup_checkup"]

[tool.coverage.report]
show_missing = true
skip_covered = true
fail_under = 93
