name: Validate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Code quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install validation tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-cov ruff bandit pyyaml

      - name: Ruff formatting
        run: ruff format --check .

      - name: Ruff linting
        run: ruff check .

      - name: Unit and adversarial tests
        run: |
          pytest \
            --cov=custom_components.backup_checkup \
            --cov-branch \
            --cov-fail-under=70

      - name: Security linting
        run: |
          bandit \
            -q \
            -r custom_components/backup_checkup \
            -x tests

      - name: Python compilation
        run: |
          python -m compileall \
            -q custom_components tests

  validate-hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check GitHub repository API
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          response_file="$(mktemp)"
          headers_file="$(mktemp)"

          status="$(
            curl --silent --show-error \
              --dump-header "${headers_file}" \
              --output "${response_file}" \
              --write-out "%{http_code}" \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPOSITORY}"
          )"

          echo "GitHub API status: ${status}"
          grep -i '^content-type:' "${headers_file}" || true

          if [[ "${status}" != "200" ]]; then
            echo "GitHub API request failed."
            jq -r '.message // .' "${response_file}" 2>/dev/null \
              || head -c 500 "${response_file}"
            exit 1
          fi

          jq -e --arg repository "${REPOSITORY}"             'type == "object" and .full_name == $repository'             "${response_file}" >/dev/null

          echo "GitHub API returned a valid repository object."

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration

  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Hassfest validation
        uses: home-assistant/actions/hassfest@master
