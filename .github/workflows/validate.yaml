name: Validate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Code quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install validation tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-cov ruff bandit pyyaml

      - name: Ruff formatting
        run: ruff format --check .

      - name: Ruff linting
        run: ruff check .

      - name: Unit and adversarial tests
        run: |
          pytest \
            --cov=custom_components.backup_checkup \
            --cov-branch \
            --cov-fail-under=70

      - name: Security linting
        run: |
          bandit \
            -q \
            -r custom_components/backup_checkup \
            -x tests

      - name: Python compilation
        run: |
          python -m compileall \
            -q custom_components tests

  validate-hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: HACS validation
        id: hacs_validation
        continue-on-error: true
        uses: hacs/action@main
        with:
          category: integration
          repository: ${{ github.repository }}
          github_token: ${{ secrets.HACS_TOKEN || github.token }}
          comment: false

      - name: Wait before retry
        if: steps.hacs_validation.outcome == 'failure'
        run: sleep 30

      - name: HACS validation retry
        if: steps.hacs_validation.outcome == 'failure'
        uses: hacs/action@main
        with:
          category: integration
          repository: ${{ github.repository }}
          github_token: ${{ secrets.HACS_TOKEN || github.token }}
          comment: false

  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Hassfest validation
        uses: home-assistant/actions/hassfest@master
